<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PRO MAX Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Inter,Arial;margin:0;background:#0b1220;color:#e2e8f0}
h1{text-align:center;padding:20px}

.filters{display:flex;flex-wrap:wrap;gap:10px;padding:15px;justify-content:center}
select{padding:8px;border-radius:8px;border:none;background:#1e293b;color:white}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;padding:20px}
.card{background:#111827;padding:15px;border-radius:14px;border:1px solid #1f2937;text-align:center}
.card h3{color:#94a3b8;font-size:13px}
.card p{font-size:28px;font-weight:bold}

.chart{background:#111827;margin:15px;border-radius:14px;padding:15px;border:1px solid #1f2937}

/* TABLE */
#costTable{font-size:16px;border-radius:14px;overflow:hidden}
#costTable th{padding:14px;font-size:13px;background:#1e293b;cursor:pointer}
#costTable td{padding:14px}
#costTable tbody tr:nth-child(even){background:#0f172a}
#costTable tbody tr:hover{background:#1f2937}
#costTable td:first-child{text-align:left;font-weight:600}
#costTable tfoot td{font-size:16px;font-weight:bold;background:#020617}

.positive{color:#22c55e}
.negative{color:#ef4444}

#tableSearch{background:#1e293b;color:white}
#alerts{background:#111827;border-radius:12px;margin:10px;padding:10px;border:1px solid #1f2937}
</style>
</head>

<body>

<h1>🔥 PRO MAX Finance Dashboard</h1>

<div class="filters">
<select id="nameFilter"></select>
<select id="deptFilter"></select>
<select id="hotelFilter"></select>
<select id="monthFilter"></select>
<select id="topFilter">
<option value="10">Top 10</option>
<option value="20">Top 20</option>
<option value="999">All</option>
</select>
</div>

<div class="kpis">
<div class="card"><h3>Income EGP</h3><p id="incomeEGP"></p></div>
<div class="card"><h3>Expenses EGP</h3><p id="costEGP"></p></div>
<div class="card"><h3>Profit EGP</h3><p id="profitEGP"></p></div>
<div class="card"><h3>Income USD</h3><p id="incomeUSD"></p></div>
<div class="card"><h3>Expenses USD</h3><p id="expUSD"></p></div>
<div class="card"><h3>Profit USD</h3><p id="profitUSD"></p></div>
</div>

<div id="alerts"></div>

<div id="chart1" class="chart"></div>
<div id="chart2" class="chart"></div>
<div id="forecastChart" class="chart"></div>
<div class="chart">
<h3 style="text-align:center">Financial Table</h3>

<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<input id="tableSearch" placeholder="🔍 Search..." style="padding:8px;border-radius:8px;border:none;width:250px">
<button onclick="exportExcel()" style="padding:8px 15px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer">
📥 Export Excel
</button>
<span id="rowCount"></span>
</div>

<table id="costTable">
<thead>
<tr>
<th>Department</th>
<th>Income USD</th>
<th>Income EGP</th>
<th>Expenses USD</th>
<th>Total Cost EGP</th>
<th>Transactions</th>
<th>Profit USD</th>
<th>Profit EGP</th>
<th>Status USD</th>
<th>Status EGP</th>
</tr>
</thead>

<tbody></tbody>

<tfoot>
<tr>
<td>Total</td>
<td id="t_incUSD"></td>
<td id="t_incEGP"></td>
<td id="t_expUSD"></td>
<td id="t_expEGP"></td>
<td id="t_count"></td>
<td id="t_pUSD"></td>
<td id="t_pEGP"></td>
<td colspan="2">—</td>
</tr>
</tfoot>
</table>
</div>

<script>
let DATA=[];
const safe=v=>isNaN(Number(v))?0:Number(v);

fetch('dashboard.json')
.then(r=>r.json())
.then(d=>{DATA=d;init();update();});

function init(){
 fill('nameFilter','A Name');
 fill('deptFilter','Deparment');
 fill('hotelFilter','Hotel');
 fillMonths();
 document.querySelectorAll('select').forEach(s=>s.onchange=update);
}

function fill(id,key){
 const sel=document.getElementById(id);
 ['All',...new Set(DATA.map(d=>d[key]||'Unknown'))]
 .forEach(v=>{
   let o=document.createElement('option');
   o.value=v;o.text=v;sel.add(o);
 });
}

function fillMonths(){
 const sel=document.getElementById('monthFilter');
 const m=['All'];
 DATA.forEach(d=>{
  if(d.Date){
   const x=new Date(d.Date).toLocaleString('en',{month:'short'});
   if(!m.includes(x)) m.push(x);
  }
 });
 m.forEach(v=>{
   let o=document.createElement('option');
   o.value=v;o.text=v;sel.add(o);
 });
}

function update(){

 const name=val('nameFilter');
 const dept=val('deptFilter');
 const hotel=val('hotelFilter');
 const month=val('monthFilter');
 const top=parseInt(val('topFilter'));

 const f=DATA.filter(d=>{
  const m=d.Date?new Date(d.Date).toLocaleString('en',{month:'short'}):'';
  return (name==='All'||d['A Name']===name)&&
         (dept==='All'||d['Deparment']===dept)&&
         (hotel==='All'||d['Hotel']===hotel)&&
         (month==='All'||m===month);
 });

 const sum=k=>f.reduce((s,d)=>s+safe(d[k]),0);

 set('incomeEGP',sum('Income EGP'),'EGP');
 set('costEGP',sum('Exp.EGP'),'EGP');
 set('profitEGP',sum('Income EGP')-sum('Exp.EGP'),'EGP',true);
 set('incomeUSD',sum('Income USD'),'USD');
 set('expUSD',sum('Exp.USD'),'USD');
 set('profitUSD',sum('Income USD')-sum('Exp.USD'),'USD',true);

 // ===== TABLE =====
 const map={};

 f.forEach(d=>{
  const k=d['Deparment']||'Unknown';
  if(!map[k]) map[k]={incUSD:0,incEGP:0,expUSD:0,expEGP:0,count:0};

  map[k].incUSD+=safe(d['Income USD']);
  map[k].incEGP+=safe(d['Income EGP']);
  map[k].expUSD+=safe(d['Exp.USD']);
  map[k].expEGP+=safe(d['Exp.EGP']);
  map[k].count++;
 });

 let rows=Object.entries(map).map(([k,v])=>{
  const pUSD=v.incUSD-v.expUSD;
  const pEGP=v.incEGP-v.expEGP;
  return {dept:k,...v,pUSD,pEGP};
 });

 const tbody=document.querySelector('#costTable tbody');

 function render(){
  const search=(document.getElementById('tableSearch').value||'').toLowerCase();

  let filtered=rows.filter(r=>
    Object.values(r).join(' ').toLowerCase().includes(search)
  );

  let totals={incUSD:0,incEGP:0,expUSD:0,expEGP:0,count:0,pUSD:0,pEGP:0};

  filtered.forEach(r=>{
   totals.incUSD+=r.incUSD;
   totals.incEGP+=r.incEGP;
   totals.expUSD+=r.expUSD;
   totals.expEGP+=r.expEGP;
   totals.count+=r.count;
   totals.pUSD+=r.pUSD;
   totals.pEGP+=r.pEGP;
  });

  tbody.innerHTML='';

  filtered.forEach(r=>{
    tbody.innerHTML+=`
    <tr>
      <td>${r.dept}</td>
      <td>$ ${r.incUSD.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td>EGP ${r.incEGP.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td>$ ${r.expUSD.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td>EGP ${r.expEGP.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td>${r.count}</td>
      <td class="${r.pUSD>=0?'positive':'negative'}">${r.pUSD>=0?'+':''}$ ${r.pUSD.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td class="${r.pEGP>=0?'positive':'negative'}">${r.pEGP>=0?'+':''}EGP ${r.pEGP.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
      <td>${r.pUSD>=0?'Profit':'Loss'}</td>
      <td>${r.pEGP>=0?'ربح':'خسارة'}</td>
    </tr>`;
  });

  document.getElementById('t_incUSD').innerText='$ '+totals.incUSD.toLocaleString();
  document.getElementById('t_incEGP').innerText='EGP '+totals.incEGP.toLocaleString();
  document.getElementById('t_expUSD').innerText='$ '+totals.expUSD.toLocaleString();
  document.getElementById('t_expEGP').innerText='EGP '+totals.expEGP.toLocaleString();
  document.getElementById('t_count').innerText=totals.count;
  document.getElementById('t_pUSD').innerText='$ '+totals.pUSD.toLocaleString();
  document.getElementById('t_pEGP').innerText='EGP '+totals.pEGP.toLocaleString();
  document.getElementById('rowCount').innerText=`Rows: ${filtered.length}`;
 }

 document.getElementById('tableSearch').addEventListener('input',render);

 render();

 // ===== ALERTS =====
 let totalProfit=sum('Income EGP')-sum('Exp.EGP');
 let alertMsg='';

 if(totalProfit<0) alertMsg+='⚠️ Loss Detected<br>';

 const best=Object.entries(map).sort((a,b)=>
 (b[1].incEGP-b[1].expEGP)-(a[1].incEGP-a[1].expEGP)
 )[0];

 if(best) alertMsg+=`🏆 Top Dept: ${best[0]}<br>`;

 const worst=Object.entries(map).sort((a,b)=>b[1].expEGP-a[1].expEGP)[0];
 if(worst) alertMsg+=`💸 Highest Cost: ${worst[0]}`;

 document.getElementById('alerts').innerHTML=alertMsg;

 drawBar('chart1',group(f,'Hotel','Income EGP',top),'Top Hotels');
 drawBar('chart2',group(f,'A Name','Exp.EGP',top),'Top Names');
}
// ===== AI FORECAST =====
const trend = {};

f.forEach(d=>{
 if(!d.Date) return;

 const date = new Date(d.Date).toLocaleDateString();
 const profit = safe(d['Income EGP']) - safe(d['Exp.EGP']);

 trend[date] = (trend[date] || 0) + profit;
});

const dates = Object.keys(trend);
const values = Object.values(trend);

let forecastPoints = 5;
let lastValue = values[values.length - 1] || 0;
let avgGrowth = 0;

if(values.length > 1){
 avgGrowth = (values[values.length-1] - values[0]) / values.length;
}

let forecastDates = [];
let forecastValues = [];

for(let i=1;i<=forecastPoints;i++){
 lastValue += avgGrowth;
 forecastDates.push("F+" + i);
 forecastValues.push(lastValue);
}

Plotly.react('forecastChart',[
 {x:dates,y:values,type:'scatter',name:'Actual'},
 {x:forecastDates,y:forecastValues,type:'scatter',name:'Forecast',line:{dash:'dot'}}
],
{
 title:'📈 Profit Forecast',
 paper_bgcolor:'#111827',
 plot_bgcolor:'#111827',
 font:{color:'#fff'}
});
function group(data,key,valField,top){
 const r={};
 data.forEach(d=>{
  const k=d[key]||'Unknown';
  r[k]=(r[k]||0)+safe(d[valField]);
 });

 return Object.entries(r)
 .sort((a,b)=>b[1]-a[1])
 .slice(0,top)
 .reduce((acc,[k,v])=>{
  acc.x.push(k);acc.y.push(v);return acc;
 },{x:[],y:[]});
}

function drawBar(id,g,title){
 Plotly.react(id,[{x:g.x,y:g.y,type:'bar'}],{
  title,
  paper_bgcolor:'#111827',
  plot_bgcolor:'#111827',
  font:{color:'white'}
 });
}

function exportExcel(){
 const table = document.getElementById("costTable");
 const wb = XLSX.utils.table_to_book(table,{sheet:"Report"});
 XLSX.writeFile(wb,"Finance_Report.xlsx");
}

function set(id,v,currency,color=false){
 const el=document.getElementById(id);
 el.innerText=(currency==='USD'?'$ ':'EGP ')+v.toLocaleString('en-US',{minimumFractionDigits:2});
 if(color) el.style.color=v>=0?'#22c55e':'#ef4444';
}

function val(id){return document.getElementById(id).value}
</script>

</body>
</html>
